<!DOCTYPE html>
<html lang="en" class="bg-gray-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookbook • Low-Fi Prototype</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .page { display: none; }
    .page.active { display: block; }
    .card { transition: all 0.2s; }
    .card:hover { transform: scale(1.03); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="min-h-screen font-sans">

  <!-- NAV -->
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <div onclick="showPage('home')" class="text-3xl font-bold text-emerald-600 cursor-pointer">🍳 Cookbook</div>
        <div class="flex gap-6 text-sm font-medium">
          <a onclick="showPage('home')" class="cursor-pointer hover:text-emerald-600">Home</a>
          <a onclick="showPage('listing')" class="cursor-pointer hover:text-emerald-600">Recipes</a>
          <a onclick="showPage('upload')" class="cursor-pointer hover:text-emerald-600">Upload</a>
          <a onclick="showPage('profile')" class="cursor-pointer hover:text-emerald-600">Profile</a>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <input id="globalSearch" onkeyup="if(event.key==='Enter') filterRecipes()" placeholder="Search recipes..." class="border border-gray-300 rounded-full px-5 py-2 w-80 focus:outline-none focus:border-emerald-500">
        <button onclick="showPage('profile')" class="bg-emerald-600 text-white px-6 py-2 rounded-full text-sm font-medium">👤 Martin</button>
      </div>
    </div>
  </nav>

  <!-- HOME PAGE -->
  <div id="home" class="page active max-w-7xl mx-auto px-6 py-8">
    <div class="bg-emerald-700 text-white rounded-3xl p-16 text-center mb-12">
      <h1 class="text-6xl font-bold mb-4">Find your next favorite recipe</h1>
      <p class="text-xl mb-8">Share • Discover • Cook together</p>
      <button onclick="showPage('listing')" class="bg-white text-emerald-700 px-10 py-4 rounded-full text-lg font-semibold">Browse all recipes</button>
    </div>

    <h2 class="text-2xl font-semibold mb-6">Featured Recipes</h2>
    <div class="grid grid-cols-4 gap-6" id="featuredGrid"></div>

    <h2 class="text-2xl font-semibold mt-12 mb-6">Categories</h2>
    <div class="flex flex-wrap gap-3">
      <div onclick="filterByCategory(this)" class="category-chip bg-white border px-6 py-3 rounded-2xl cursor-pointer hover:border-emerald-500">Italian</div>
      <div onclick="filterByCategory(this)" class="category-chip bg-white border px-6 py-3 rounded-2xl cursor-pointer hover:border-emerald-500">Vegan</div>
      <div onclick="filterByCategory(this)" class="category-chip bg-white border px-6 py-3 rounded-2xl cursor-pointer hover:border-emerald-500">Quick (≤30min)</div>
      <div onclick="filterByCategory(this)" class="category-chip bg-white border px-6 py-3 rounded-2xl cursor-pointer hover:border-emerald-500">Dessert</div>
    </div>
  </div>

  <!-- LISTING PAGE -->
  <div id="listing" class="page max-w-7xl mx-auto px-6 py-8">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-semibold">All Recipes (12)</h1>
      <div class="flex gap-4">
        <select id="sortSelect" onchange="sortRecipes()" class="border border-gray-300 rounded-xl px-4 py-2">
          <option value="popularity">Sort by Popularity</option>
          <option value="rating">Sort by Rating</option>
          <option value="time">Sort by Time</option>
        </select>
      </div>
    </div>
    <div class="grid grid-cols-4 gap-6" id="recipeGrid"></div>
  </div>

  <!-- RECIPE DETAIL PAGE -->
  <div id="detail" class="page max-w-4xl mx-auto px-6 py-8">
    <button onclick="showPage('listing')" class="text-emerald-600 mb-6 flex items-center gap-2"><i class="fas fa-arrow-left"></i> Back to recipes</button>
    <div id="detailContent"></div>
  </div>

  <!-- UPLOAD PAGE -->
  <div id="upload" class="page max-w-2xl mx-auto px-6 py-8 bg-white rounded-3xl shadow">
    <h1 class="text-3xl font-semibold mb-8">Upload New Recipe</h1>
    <form onsubmit="submitRecipe(event)" class="space-y-8">
      <div>
        <label class="block text-sm font-medium mb-2">Recipe Name</label>
        <input id="recipeName" required class="w-full border border-gray-300 rounded-2xl px-5 py-4" placeholder="Pasta Carbonara">
      </div>
      <div>
        <label class="block text-sm font-medium mb-2">Image URL (placeholder)</label>
        <input id="recipeImage" value="https://picsum.photos/id/1015/600/400" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
      </div>
      <div class="grid grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium mb-2">Cooking Time (min)</label>
          <input id="cookTime" type="number" value="25" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Category</label>
          <select id="category" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
            <option>Italian</option><option>Vegan</option><option>Dessert</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2">Ingredients (one per line)</label>
        <textarea id="ingredients" rows="6" class="w-full border border-gray-300 rounded-3xl px-5 py-4">200g spaghetti\n100g pancetta\n2 eggs</textarea>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2">Instructions (one step per line)</label>
        <textarea id="instructions" rows="8" class="w-full border border-gray-300 rounded-3xl px-5 py-4">Boil pasta\nFry pancetta\nMix eggs</textarea>
      </div>
      <button type="submit" class="w-full bg-emerald-600 text-white py-5 rounded-3xl text-lg font-semibold">Share Recipe →</button>
    </form>
  </div>

  <!-- PROFILE PAGE -->
  <div id="profile" class="page max-w-4xl mx-auto px-6 py-8">
    <div class="flex gap-8">
      <div class="w-48 h-48 bg-emerald-100 rounded-3xl flex items-center justify-center text-6xl">👨‍🍳</div>
      <div>
        <h1 class="text-4xl font-bold">Martin</h1>
        <p class="text-gray-600">Home cook • 47 recipes shared • Kigali, Rwanda</p>
        <div class="mt-6 flex gap-4">
          <button onclick="alert('Profile edited (demo)')" class="border border-gray-400 px-6 py-3 rounded-2xl">Edit Profile</button>
          <button onclick="showPage('upload')" class="bg-emerald-600 text-white px-6 py-3 rounded-2xl">+ Upload New</button>
        </div>
      </div>
    </div>

    <div class="mt-12">
      <div class="flex border-b">
        <button onclick="switchTab(0)" class="tab-btn active px-8 py-4 font-medium border-b-2 border-emerald-600">My Recipes (8)</button>
        <button onclick="switchTab(1)" class="tab-btn px-8 py-4 font-medium">Favorites (12)</button>
      </div>
      <div id="profileGrid" class="grid grid-cols-4 gap-6 mt-8"></div>
    </div>
  </div>

  <script>
    // Mock Recipes
    let recipes = [
      {id:1, name:"Classic Margherita Pizza", desc:"Fresh basil and mozzarella", time:25, rating:4.9, img:"https://picsum.photos/id/1015/600/400", category:"Italian", popularity:1200},
      {id:2, name:"Avocado Toast Supreme", desc:"Vegan breakfast favorite", time:10, rating:4.7, img:"https://picsum.photos/id/201/600/400", category:"Vegan", popularity:890},
      {id:3, name:"Chocolate Lava Cake", desc:"Molten center magic", time:35, rating:5.0, img:"https://picsum.photos/id/292/600/400", category:"Dessert", popularity:2100},
      {id:4, name:"Thai Green Curry", desc:"Spicy coconut delight", time:40, rating:4.8, img:"https://picsum.photos/id/431/600/400", category:"Asian", popularity:650},
      {id:5, name:"Falafel Wraps", desc:"Crispy & fresh", time:30, rating:4.6, img:"https://picsum.photos/id/488/600/400", category:"Vegan", popularity:420},
      {id:6, name:"Spaghetti Carbonara", desc:"Creamy Italian classic", time:20, rating:4.9, img:"https://picsum.photos/id/1016/600/400", category:"Italian", popularity:1800},
      {id:7, name:"Blueberry Pancakes", desc:"Weekend brunch", time:15, rating:4.5, img:"https://picsum.photos/id/870/600/400", category:"Breakfast", popularity:950},
      {id:8, name:"Mango Sticky Rice", desc:"Thai dessert", time:25, rating:4.8, img:"https://picsum.photos/id/1080/600/400", category:"Dessert", popularity:670}
    ];

    function renderRecipes(filteredRecipes, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      filteredRecipes.forEach(r => {
        const card = document.createElement('div');
        card.className = `card bg-white border border-gray-200 rounded-3xl overflow-hidden cursor-pointer`;
        card.innerHTML = `
          <img src="${r.img}" class="w-full h-48 object-cover">
          <div class="p-5">
            <div class="font-semibold text-lg leading-tight">${r.name}</div>
            <div class="text-sm text-gray-600 mt-1">${r.desc}</div>
            <div class="flex justify-between items-center mt-4">
              <div class="flex items-center gap-1 text-amber-500">★ ${r.rating}</div>
              <div class="text-sm text-gray-500">${r.time} min</div>
            </div>
          </div>
        `;
        card.onclick = () => showDetail(r);
        container.appendChild(card);
      });
    }

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      if (pageId === 'home') renderRecipes(recipes.slice(0,4), 'featuredGrid');
      if (pageId === 'listing') renderRecipes(recipes, 'recipeGrid');
      if (pageId === 'profile') renderRecipes(recipes.slice(0,4), 'profileGrid');
    }

    function showDetail(recipe) {
      document.getElementById('detailContent').innerHTML = `
        <img src="${recipe.img}" class="w-full rounded-3xl">
        <h1 class="text-4xl font-bold mt-8">${recipe.name}</h1>
        <div class="flex gap-8 my-6 text-lg">
          <div>⏱ ${recipe.time} minutes</div>
          <div>⭐ ${recipe.rating} (243 reviews)</div>
        </div>
        <p class="text-lg text-gray-700">${recipe.desc} — A community favorite shared by thousands of home cooks.</p>
        
        <div class="grid grid-cols-2 gap-12 mt-12">
          <div>
            <h3 class="font-semibold text-xl mb-4">Ingredients</h3>
            <ul class="space-y-3 text-lg">
              <li class="flex items-center gap-3"><input type="checkbox" class="w-5 h-5"> 200g flour</li>
              <li class="flex items-center gap-3"><input type="checkbox" class="w-5 h-5"> 2 eggs</li>
              <li class="flex items-center gap-3"><input type="checkbox" class="w-5 h-5"> Fresh basil</li>
            </ul>
          </div>
          <div>
            <h3 class="font-semibold text-xl mb-4">Instructions</h3>
            <ol class="space-y-6 text-lg list-decimal pl-6">
              <li>Preheat oven to 220°C</li>
              <li>Mix ingredients thoroughly</li>
              <li>Bake for ${recipe.time} minutes</li>
            </ol>
          </div>
        </div>

        <div class="mt-16 border-t pt-12">
          <h3 class="font-semibold text-2xl mb-6">Reviews &amp; Ratings</h3>
          <div class="bg-gray-50 p-6 rounded-3xl">
            <div class="flex gap-4 mb-8">
              <div class="text-6xl">⭐⭐⭐⭐⭐</div>
              <div>
                <div class="font-medium">"Best pizza I’ve ever made at home!"</div>
                <div class="text-sm text-gray-500">— Sarah K., 2 days ago</div>
              </div>
            </div>
            <textarea class="w-full border border-gray-300 rounded-3xl p-6 h-32" placeholder="Write your review..."></textarea>
            <button onclick="alert('Review submitted! Thank you ❤️')" class="mt-4 bg-emerald-600 text-white px-10 py-3 rounded-2xl">Post Review</button>
          </div>
        </div>
      `;
      showPage('detail');
    }

    function filterRecipes() {
      const term = document.getElementById('globalSearch').value.toLowerCase();
      const filtered = recipes.filter(r => 
        r.name.toLowerCase().includes(term) || r.desc.toLowerCase().includes(term)
      );
      renderRecipes(filtered, 'recipeGrid');
      showPage('listing');
    }

    function filterByCategory(el) {
      const cat = el.textContent.toLowerCase();
      const filtered = recipes.filter(r => r.category.toLowerCase().includes(cat) || r.name.toLowerCase().includes(cat));
      renderRecipes(filtered, 'recipeGrid');
      showPage('listing');
    }

    function sortRecipes() {
      const sortBy = document.getElementById('sortSelect').value;
      let sorted = [...recipes];
      if (sortBy === 'rating') sorted.sort((a,b) => b.rating - a.rating);
      else if (sortBy === 'time') sorted.sort((a,b) => a.time - b.time);
      else sorted.sort((a,b) => b.popularity - a.popularity);
      renderRecipes(sorted, 'recipeGrid');
    }

    function submitRecipe(e) {
      e.preventDefault();
      alert("✅ Recipe uploaded successfully!\n\nIt will appear in your profile and the listing page.");
      showPage('listing');
    }

    function switchTab(n) {
      document.querySelectorAll('.tab-btn').forEach((btn,i) => {
        btn.classList.toggle('active', i===n);
        btn.classList.toggle('border-b-2', i===n);
        btn.classList.toggle('border-emerald-600', i===n);
      });
    }

    // Initialize
    window.onload = () => {
      showPage('home');
      // Tailwind script already loaded
    };
  </script>
</body>
</html>
